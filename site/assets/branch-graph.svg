    <circle cx="382" cy="274" r="9" />
    <circle cx="462" cy="274" r="9" />
    <circle cx="542" cy="274" r="9" />
    <circle cx="604" cy="274" r="9" />
  </g>

  <g stroke="#c8d7eb" stroke-width="2.5" stroke-dasharray="4 8" opacity="0.7">
